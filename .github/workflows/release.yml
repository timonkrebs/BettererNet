name: Release

# Publishes all packable projects to NuGet. Triggered by pushing a version tag
# (e.g. `v0.1.0-alpha`), or manually via the Actions tab with an explicit version.
#
# Auth uses nuget.org Trusted Publishing (OIDC) via the NuGet/login action -- no
# API key secret to store or rotate. nuget.org must have a trusted-publishing
# policy for package owner `tsharp`, this repository, and workflow `release.yml`,
# and the job needs `id-token: write` to request the OIDC token.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0-alpha)'
        required: true
      dry_run:
        description: 'Pack only — do not push to NuGet'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # required for nuget.org Trusted Publishing (OIDC)

jobs:
  release:
    name: Pack & publish
    runs-on: ubuntu-latest
    # Real publishes run in the `nuget-release` environment, so they are subject to
    # its protection rules (restrict to `v*` tags, optional required reviewer) and the
    # nuget.org policy can require the matching environment claim -- narrowing when a
    # publish key can be minted. Dry runs resolve to an empty name (no environment),
    # so packaging can still be verified on any branch.
    environment: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') && 'nuget-release' || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$GITHUB_REF_NAME"
          fi
          VERSION="${VERSION#v}" # tags are vX.Y.Z; also tolerate a leading v in manual input
          # Validate as SemVer before it flows into build/pack/push. The input is
          # attacker-influenceable on manual runs; passing it via env (not inline
          # template interpolation) plus this check avoids shell injection and bad versions.
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "::error::Invalid version '$VERSION' (expected SemVer, e.g. 1.2.3 or 0.1.0-alpha)." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version $VERSION"

      - name: Restore
        run: dotnet restore BettererNet.sln

      - name: Build
        run: dotnet build BettererNet.sln --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      # VSTest projects (xUnit/NUnit/MSTest) run via `dotnet test`; TUnit is
      # Microsoft.Testing.Platform-only and can't run under `dotnet test` on the
      # .NET 10 SDK, so it runs on its own below.
      - name: Test (xUnit, NUnit, MSTest)
        shell: bash
        run: |
          set -euo pipefail
          for proj in $(grep -rl 'Microsoft.NET.Test.Sdk' tests samples --include='*.csproj'); do
            dotnet test "$proj" --configuration Release --no-build
          done

      - name: Test (TUnit via Microsoft.Testing.Platform)
        run: dotnet run --project tests/BettererNet.TUnit.Tests --configuration Release --no-build

      - name: Pack
        run: dotnet pack BettererNet.sln --configuration Release --no-build -p:Version=${{ steps.version.outputs.version }} -o artifacts

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived
      # nuget.org API key. Skipped on dry runs, which never touch nuget.org.
      - name: Authenticate to NuGet (Trusted Publishing)
        id: login
        if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
        uses: NuGet/login@v1
        with:
          user: tsharp

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
          # Manual runs default to pack-only; tag pushes always publish.
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
        run: |
          # Explicit allow-list of the packages we publish, so a new or internal
          # project can never land on nuget.org by accident (vs. an artifacts/*.nupkg glob).
          packages=(
            BettererNet.Core
            BettererNet.Cli
            BettererNet.Regex
            BettererNet.Coverage
            BettererNet.Sarif
            BettererNet.Format
            BettererNet.Roslyn
            BettererNet.Roslyn.MSBuild
            BettererNet.NetArchTest
            BettererNet.Xunit
            BettererNet.NUnit
            BettererNet.MSTest
            BettererNet.TUnit
          )

          # Verify every expected package was produced before pushing any.
          for id in "${packages[@]}"; do
            pkg="artifacts/${id}.${VERSION}.nupkg"
            if [ ! -f "$pkg" ]; then
              echo "::error::Expected package not found: $pkg" >&2
              exit 1
            fi
          done

          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run: packed ${#packages[@]} package(s) for $VERSION; not pushing to NuGet."
            printf '  %s\n' "${packages[@]/%/.$VERSION.nupkg}"
            exit 0
          fi

          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::No NuGet key from Trusted Publishing. Check the nuget.org policy (owner/repo/workflow must match) and that the job has id-token: write." >&2
            exit 1
          fi

          for id in "${packages[@]}"; do
            pkg="artifacts/${id}.${VERSION}.nupkg"
            echo "Pushing $pkg"
            dotnet nuget push "$pkg" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate \
              --no-symbols

            # Push symbols explicitly: dotnet nuget push does not reliably pair a
            # .snupkg that lives in a subdirectory (NuGet/Home#8016), so the symbol
            # package would otherwise be built but never published.
            sym="artifacts/${id}.${VERSION}.snupkg"
            if [ -f "$sym" ]; then
              echo "Pushing $sym"
              dotnet nuget push "$sym" \
                --api-key "$NUGET_API_KEY" \
                --source https://api.nuget.org/v3/index.json \
                --skip-duplicate
            else
              echo "::warning::Symbol package not found: $sym"
            fi
          done
