name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore BettererNet.sln

      - name: Build
        run: dotnet build BettererNet.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test BettererNet.sln --configuration Release --no-build --verbosity normal
